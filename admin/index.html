<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>郑柱坚个人网站后台</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #eef2f6;
      --paper: #ffffff;
      --ink: #16202b;
      --muted: #667383;
      --line: #d9e1ea;
      --accent: #0f766e;
      --accent-strong: #0b5d57;
      --accent-soft: #e8f6f3;
      --blue: #155eef;
      --warn: #9a6700;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(22, 32, 43, 0.08);
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(22, 32, 43, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 32, 43, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
      font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .shell {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid rgba(217, 225, 234, 0.92);
      background: rgba(238, 242, 246, 0.88);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      color: #fff;
      background: linear-gradient(135deg, #13212b, #21576f);
      border-radius: 9px;
      font-size: 13px;
      font-weight: 900;
    }

    .brand-copy b,
    .brand-copy span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn,
    .segmented button {
      min-height: 40px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 10px 24px rgba(22, 32, 43, 0.05);
      font-weight: 800;
    }

    .btn.primary {
      border-color: var(--accent-strong);
      background: var(--accent);
      color: #fff;
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.72);
    }

    .btn.warn {
      border-color: #f3dca5;
      background: #fff8e7;
      color: #6a4300;
    }

    .hero {
      padding: 22px 0 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
    }

    .hero-card,
    .status-card,
    .panel,
    .editor-shell,
    .preview-shell {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 28px;
      color: #fff;
      background:
        radial-gradient(circle at 84% 12%, rgba(21, 94, 239, 0.32), transparent 32%),
        radial-gradient(circle at 12% 86%, rgba(15, 118, 110, 0.18), transparent 38%),
        linear-gradient(135deg, #13212b, #24394c);
    }

    .hero-card p:first-child {
      margin: 0 0 12px;
      color: #84e0d5;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 {
      margin-bottom: 14px;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .hero-card p:last-child {
      max-width: 760px;
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
    }

    .status-card {
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .status-card h2,
    .panel h2 {
      margin-bottom: 0;
      font-size: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 4px 10px;
      color: var(--accent-strong);
      border: 1px solid #b6e1da;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 900;
    }

    .status-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .status-list li {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .status-list b {
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(420px, 0.9fr);
      gap: 16px;
      padding-bottom: 22px;
    }

    .editor-shell,
    .preview-shell {
      min-height: 760px;
      overflow: hidden;
    }

    .section-tabs,
    .preview-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 16px 0;
      overflow-x: auto;
    }

    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .segmented button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 900;
    }

    .editor-body {
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .panel {
      padding: 16px;
    }

    .panel h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field,
    .array-item {
      display: grid;
      gap: 6px;
    }

    .field label,
    .array-head strong {
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field textarea,
    .field select,
    .token-row input {
      width: 100%;
      padding: 10px 12px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .field textarea {
      min-height: 108px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus,
    .token-row input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(15, 118, 110, 0.14);
      outline-offset: 1px;
    }

    .field small {
      color: var(--muted);
      font-size: 12px;
    }

    .array-list {
      display: grid;
      gap: 12px;
    }

    .array-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fbfc;
    }

    .array-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .danger-text { color: var(--danger); }

    .preview-shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .preview-meta {
      padding: 8px 16px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-frame {
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      margin: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .publish-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .token-row {
      display: grid;
      gap: 10px;
    }

    .notice {
      padding: 12px 14px;
      border: 1px solid #f1d9a2;
      border-radius: 8px;
      background: #fff8e6;
      color: #684100;
      font-size: 13px;
    }

    .notice.danger {
      border-color: #f4b6b1;
      background: #fff4f3;
      color: #8b1e1e;
    }

    .log {
      min-height: 120px;
      padding: 12px 14px;
      color: #d7e2ee;
      border-radius: 8px;
      background: #16202b;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .footer-space { height: 6px; }

    @media (max-width: 1100px) {
      .hero-grid,
      .workspace,
      .publish-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .shell { width: min(100% - 20px, 1400px); }
      .topbar-inner,
      .field-grid,
      .field-grid.three {
        grid-template-columns: 1fr;
        display: grid;
      }
      .topbar-inner {
        align-items: start;
        padding: 12px 0;
      }
      .actions {
        width: 100%;
      }
      .btn { width: 100%; }
      .editor-shell,
      .preview-shell {
        min-height: auto;
      }
      .preview-frame {
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="brand">
        <div class="mark">ZZJ</div>
        <div class="brand-copy">
          <b>郑柱坚个人网站后台</b>
          <span>表单化编辑、实时预览、直接发布</span>
        </div>
      </div>
      <div class="actions">
        <a class="btn ghost" href="../index.html" target="_blank" rel="noreferrer">查看线上网站</a>
        <button class="btn ghost" id="export-json" type="button">导出内容备份</button>
        <button class="btn ghost" id="import-trigger" type="button">导入内容备份</button>
        <button class="btn warn" id="reset-draft" type="button">恢复已发布内容</button>
        <input id="import-file" type="file" accept=".json" hidden>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero-grid">
        <article class="hero-card">
          <p>VISUAL CONTENT ADMIN</p>
          <h1>给小白用的内容后台，不再直接改 HTML。</h1>
          <p>左边按表单改内容，右边看页面实时预览。确认无误后，在发布页填入 GitHub token，就能直接更新首页、作品集、简历页和内容配置文件。</p>
        </article>
        <aside class="status-card">
          <h2>当前状态</h2>
          <span class="pill">本地草稿实时保存</span>
          <ul class="status-list">
            <li><b>编辑方式</b><span>表单化内容编辑</span></li>
            <li><b>预览方式</b><span>后台右侧 iframe 实时预览</span></li>
            <li><b>发布目标</b><span>GitHub Pages / main 分支</span></li>
            <li><b>安全原则</b><span>Token 不写入仓库，不存浏览器</span></li>
          </ul>
        </aside>
      </div>
    </section>

    <section class="workspace">
      <section class="editor-shell">
        <div class="section-tabs segmented" id="editor-tabs"></div>
        <div class="editor-body" id="editor-body"></div>
      </section>

      <section class="preview-shell">
        <div class="preview-tabs segmented" id="preview-tabs"></div>
        <div class="preview-meta" id="preview-meta">预览会随着左侧输入自动更新。</div>
        <iframe class="preview-frame" id="preview-frame" title="页面预览"></iframe>
      </section>
    </section>
    <div class="footer-space"></div>
  </main>

  <script src="site-data.js"></script>
  <script>
    const REPO_OWNER = "Vincentzozo";
    const REPO_NAME = "product-portfolio";
    const BRANCH = "main";
    const STORAGE_KEY = "zzj-site-admin-draft-v1";
    const PAGES = [
      { key: "home", label: "首页内容" },
      { key: "portfolio", label: "作品集内容" },
      { key: "resume", label: "打印简历内容" },
      { key: "publish", label: "发布" }
    ];
    const PREVIEWS = [
      { key: "home", label: "首页预览" },
      { key: "portfolio", label: "作品集预览" },
      { key: "resume", label: "简历预览" }
    ];

    const publishedData = deepClone(window.SITE_DATA);
    const savedDraft = readDraft();
    let state = savedDraft || deepClone(window.SITE_DATA);
    let currentEditor = "home";
    let currentPreview = "home";
    let githubToken = "";

    const editorTabs = document.getElementById("editor-tabs");
    const previewTabs = document.getElementById("preview-tabs");
    const editorBody = document.getElementById("editor-body");
    const previewFrame = document.getElementById("preview-frame");
    const previewMeta = document.getElementById("preview-meta");
    const importFile = document.getElementById("import-file");

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function readDraft() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function saveDraft() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function joinLines(list) {
      return Array.isArray(list) ? list.join("\n") : "";
    }

    function splitLines(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function updateAtPath(path, value) {
      const parts = path.split(".");
      let target = state;
      for (let i = 0; i < parts.length - 1; i += 1) {
        target = target[parts[i]];
      }
      target[parts[parts.length - 1]] = value;
      saveDraft();
      renderPreview();
    }

    function renderTabs() {
      editorTabs.innerHTML = PAGES.map((item) => `
        <button type="button" class="${item.key === currentEditor ? "active" : ""}" data-editor-tab="${item.key}">${item.label}</button>
      `).join("");
      previewTabs.innerHTML = PREVIEWS.map((item) => `
        <button type="button" class="${item.key === currentPreview ? "active" : ""}" data-preview-tab="${item.key}">${item.label}</button>
      `).join("");
    }

    function renderField(label, path, value, type = "text", hint = "") {
      const safeValue = escapeHtml(value);
      const input = type === "textarea"
        ? `<textarea data-path="${path}">${safeValue}</textarea>`
        : `<input type="${type}" data-path="${path}" value="${safeValue}">`;
      return `
        <div class="field">
          <label>${label}</label>
          ${input}
          ${hint ? `<small>${hint}</small>` : ""}
        </div>
      `;
    }

    function renderMetricsEditor(path, items) {
      return `
        <div class="panel">
          <h3>数据卡片</h3>
          <div class="array-list">
            ${items.map((item, index) => `
              <div class="array-item">
                <div class="array-head">
                  <strong>卡片 ${index + 1}</strong>
                  <button class="btn ghost danger-text" type="button" data-remove="${path}" data-index="${index}">删除</button>
                </div>
                <div class="field-grid three">
                  ${renderField("数字", `${path}.${index}.value`, item.value)}
                  ${renderField("标题", `${path}.${index}.label`, item.label)}
                  ${renderField("说明", `${path}.${index}.note`, item.note || "")}
                </div>
              </div>
            `).join("")}
          </div>
          <div style="margin-top:12px">
            <button class="btn" type="button" data-add="${path}" data-kind="metric">新增数据卡片</button>
          </div>
        </div>
      `;
    }

    function renderHighlightsEditor(path, items) {
      return `
        <div class="panel">
          <h3>首页亮点案例</h3>
          <div class="array-list">
            ${items.map((item, index) => `
              <div class="array-item">
                <div class="array-head">
                  <strong>亮点 ${index + 1}</strong>
                  <button class="btn ghost danger-text" type="button" data-remove="${path}" data-index="${index}">删除</button>
                </div>
                <div class="field-grid">
                  ${renderField("标题", `${path}.${index}.title`, item.title)}
                  ${renderField("证明语", `${path}.${index}.proof`, item.proof)}
                </div>
                ${renderField("摘要", `${path}.${index}.summary`, item.summary, "textarea")}
              </div>
            `).join("")}
          </div>
          <div style="margin-top:12px">
            <button class="btn" type="button" data-add="${path}" data-kind="highlight">新增亮点</button>
          </div>
        </div>
      `;
    }

    function renderPortfolioCases(path, items) {
      return `
        <div class="panel">
          <h3>作品集案例</h3>
          <div class="array-list">
            ${items.map((item, index) => `
              <div class="array-item">
                <div class="array-head">
                  <strong>案例 ${index + 1}</strong>
                  <button class="btn ghost danger-text" type="button" data-remove="${path}" data-index="${index}">删除</button>
                </div>
                <div class="field-grid three">
                  ${renderField("角标", `${path}.${index}.badge`, item.badge)}
                  ${renderField("主数字", `${path}.${index}.metric`, item.metric)}
                  ${renderField("时间", `${path}.${index}.duration`, item.duration)}
                </div>
                ${renderField("案例标题", `${path}.${index}.title`, item.title)}
                ${renderField("摘要", `${path}.${index}.summary`, item.summary, "textarea")}
                <div class="field-grid">
                  ${renderField("问题", `${path}.${index}.problem`, item.problem, "textarea")}
                  ${renderField("动作", `${path}.${index}.action`, item.action, "textarea")}
                </div>
                ${renderField("结果", `${path}.${index}.result`, item.result, "textarea")}
              </div>
            `).join("")}
          </div>
          <div style="margin-top:12px">
            <button class="btn" type="button" data-add="${path}" data-kind="portfolio-case">新增案例</button>
          </div>
        </div>
      `;
    }

    function renderExperienceEditor(path, items, title) {
      const isProject = path.includes("projects");
      return `
        <div class="panel">
          <h3>${title}</h3>
          <div class="array-list">
            ${items.map((item, index) => `
              <div class="array-item">
                <div class="array-head">
                  <strong>${title} ${index + 1}</strong>
                  <button class="btn ghost danger-text" type="button" data-remove="${path}" data-index="${index}">删除</button>
                </div>
                <div class="field-grid three">
                  ${isProject
                    ? renderField("项目标题", `${path}.${index}.title`, item.title)
                    : renderField("公司 / 经历主体", `${path}.${index}.company`, item.company)}
                  ${renderField(isProject ? "项目摘要" : "岗位", `${path}.${index}.${isProject ? "summary" : "role"}`, isProject ? item.summary : item.role)}
                  ${renderField("时间", `${path}.${index}.date`, item.date)}
                </div>
                ${renderField("要点", `${path}.${index}.bullets`, joinLines(item.bullets), "textarea", "一行一个要点")}
              </div>
            `).join("")}
          </div>
          <div style="margin-top:12px">
            <button class="btn" type="button" data-add="${path}" data-kind="${isProject ? "project" : "experience"}">新增${title}</button>
          </div>
        </div>
      `;
    }

    function renderEditor() {
      if (currentEditor === "home") {
        editorBody.innerHTML = `
          <div class="panel">
            <h2>基础信息</h2>
            <p class="helper">这部分会同步影响首页、作品集和简历页顶部信息。</p>
            <div class="field-grid">
              ${renderField("网站名称", "site.siteName", state.site.siteName)}
              ${renderField("姓名", "site.personName", state.site.personName)}
              ${renderField("岗位定位", "site.role", state.site.role)}
              ${renderField("联系标题", "site.contactTitle", state.site.contactTitle)}
            </div>
            ${renderField("个人一句话定位", "site.tagline", state.site.tagline, "textarea")}
            <div class="field-grid">
              ${renderField("邮箱 1", "site.emails.0", state.site.emails[0] || "")}
              ${renderField("邮箱 2", "site.emails.1", state.site.emails[1] || "")}
            </div>
          </div>
          <div class="panel">
            <h2>首页首屏</h2>
            <div class="field-grid">
              ${renderField("上方英文标签", "home.eyebrow", state.home.eyebrow)}
              ${renderField("状态卡标题", "home.heroStatusTitle", state.home.heroStatusTitle)}
            </div>
            ${renderField("首页主标题", "home.title", state.home.title, "textarea")}
            ${renderField("首页介绍", "home.lead", state.home.lead, "textarea")}
            ${renderField("状态卡说明", "home.heroStatusText", state.home.heroStatusText, "textarea")}
          </div>
          ${renderMetricsEditor("home.metrics", state.home.metrics)}
          ${renderHighlightsEditor("home.highlights", state.home.highlights)}
          <div class="panel">
            <h2>个人优势</h2>
            ${renderField("优势列表", "home.strengths", joinLines(state.home.strengths), "textarea", "一行一个优势")}
          </div>
        `;
      }

      if (currentEditor === "portfolio") {
        editorBody.innerHTML = `
          <div class="panel">
            <h2>作品集头图</h2>
            <div class="field-grid">

    function renderPreview() {
      const pages = {

      window.__generatedPages = pages;
    }

      renderTabs();
      renderEditor();
      renderPreview();

      const parts = path.split(".");
      let target = state;
      for (const part of parts) target = target[part];
      target.splice(index, 1);
      saveDraft();
      render();
    }

    function addArrayItem(path, kind) {
      const parts = path.split(".");
      let target = state;
      for (const part of parts) target = target[part];
      const factory = {
        metric: () => ({ value: "新数据", label: "新标题", note: "补充说明" }),
        highlight: () => ({ title: "新亮点", summary: "补充这个亮点的工作内容。", proof: "补一条证明语" }),

          badge: "CASE",

          result: "最后结果"

        experience: () => ({
          company: "新公司或经历",
          role: "岗位名称",
          date: "时间",
          bullets: ["补充一条经历要点"]
        }),

    function downloadJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "zzj-site-content.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function readImportedFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            resolve(JSON.parse(reader.result));
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsText(file, "utf-8");
      });
    }

    function setLog(message) {
      const log = document.getElementById("publish-log");
      if (log) log.textContent = message;
    }

    function toBase64Utf8(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    function encodePath(path) {
      return path.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    async function githubRequest(path, options = {}) {
      const response = await fetch(`https://api.github.com${path}`, {
        ...options,
        headers: {
          Accept: "application/vnd.github+json",
          Authorization: `Bearer ${githubToken}`,
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${response.status} ${response.statusText}\n${text}`);
      }
      return response.status === 204 ? null : response.json();
    }

    async function getFileSha(path) {
      const result = await githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodePath(path)}?ref=${BRANCH}`);
      return result.sha;
    }

    async function updateFile(path, content, message) {
      let sha = null;
      try {
        sha = await getFileSha(path);
      } catch (error) {
        sha = null;
      }
      return githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodePath(path)}`, {
        method: "PUT",
        body: JSON.stringify({
          message,
          content: toBase64Utf8(content),
          branch: BRANCH,
          sha
        })
      });
    }

    function serializeDataScript(data) {
      return `window.SITE_DATA = ${JSON.stringify(data, null, 2)};\n`;
    }

    async function verifyToken() {
      githubToken = document.getElementById("github-token").value.trim();
      if (!githubToken) {
        setLog("请先输入 GitHub token。");
        return;
      }
      setLog("正在验证 GitHub 连接...");
      const user = await githubRequest("/user");
      setLog(`连接成功。\n当前账号：${user.login}\n仓库：${REPO_OWNER}/${REPO_NAME}`);
    }

    async function publishAll() {
      githubToken = document.getElementById("github-token").value.trim();
      const commitMessage = document.getElementById("commit-message").value.trim() || "更新网站内容";
      if (!githubToken) {
        setLog("请先输入 GitHub token。");
        return;

        { path: "portfolio.html", content: generatePortfolioHtml(state) },
        { path: "resume.html", content: generateResumeHtml(state) }
      ];

      setLog("开始发布...\n");
      for (const file of files) {
        setLog(`${document.getElementById("publish-log").textContent}更新 ${file.path}...\n`);
        await updateFile(file.path, file.content, commitMessage);
      }
      setLog(`${document.getElementById("publish-log").textContent}\n发布完成。\nGitHub Pages 通常会在 1-3 分钟内更新。`);
    }

    .section{padding:72px 0}.head{display:grid;grid-template-columns:.65fr 1.35fr;gap:32px;margin-bottom:30px}.head h2{margin:0;font-size:34px}.head p{margin:0;color:var(--muted)}.case-list{display:grid;gap:22px}.case{display:grid;grid-template-columns:220px minmax(0,1fr);overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:0 14px 34px rgba(17,21,27,.06)}.case-side{padding:26px;color:#fff;background:var(--tone,#0b6e63)}.case-side small{display:block;margin-bottom:54px;opacity:.7;font-weight:900}.case-side b{display:block;font-size:38px;line-height:1}.case-side span{font-size:12px;opacity:.78}.case-main{padding:26px 28px}.case-main h3{margin:0 0 7px;font-size:24px}.case-main>p{margin:0 0 18px;color:var(--muted)}.case-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.block{padding-top:12px;border-top:2px solid var(--line)}.block h4{margin:0 0 7px;color:var(--blue);font-size:12px}.block p{margin:0;color:#424b57;font-size:13px}.method{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}.method div{min-height:120px;padding:18px 14px;background:#fff}.method b{display:block;margin-bottom:18px;color:var(--green);font-size:12px}.method span{font-size:13px;font-weight:800}
    .contact{padding:60px 0;color:#fff;background:#11151b}.contact-grid{display:flex;justify-content:space-between;align-items:center;gap:30px}.contact h2{margin:0 0 8px;font-size:36px}.contact p{margin:0;color:rgba(255,255,255,.65)}.contact-links{display:grid;gap:8px;min-width:270px}.contact-links a{padding:10px 12px;border:1px solid rgba(255,255,255,.18);border-radius:8px}

</head>
<body>
  <header class="nav">
    <nav class="shell nav-inner" aria-label="作品集导航">
      <a class="brand" href="index.html">${escapeHtml(data.site.siteName)}</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="#cases">案例</a>
        <a href="#method">方法</a>
        <a href="resume.html">打印简历</a>
        <a href="#contact">联系</a>
      </div>
    </nav>
  </header>
  <main>
    <section class="hero">
      <div class="shell hero-grid">
        <div>
          <span class="eyebrow">${escapeHtml(data.portfolio.eyebrow)}</span>
          <h1>${escapeHtml(data.portfolio.title)}</h1>
          <p>${escapeHtml(data.portfolio.lead)}</p>
        </div>
        <div class="hero-proof">${proofCards}</div>
      </div>
    </section>
    <section class="section" id="cases">
      <div class="shell">
        <div class="head"><h2>精选案例</h2><p>${escapeHtml(data.site.tagline)}</p></div>
        <div class="case-list">${cases}</div>
      </div>
    </section>
    <section class="section" id="method">
      <div class="shell">
        <div class="head"><h2>工作方法</h2><p>通过固定步骤降低信息损耗，让现场、产品、研发和测试更容易形成同一套语言。</p></div>
        <div class="method">${method}</div>
      </div>
    </section>
  </main>
  <footer class="contact" id="contact">
    <div class="shell contact-grid">
      <div><h2>${escapeHtml(data.site.contactTitle)}</h2><p>${escapeHtml(data.site.role)}</p></div>
      <div class="contact-links">${emails}</div>
    </div>
  </footer>
</body>
</html>`;
    }

    function generateResumeHtml(data) {
      const proofs = data.resume.proofs.map((item) => `
        <div><b>${escapeHtml(item.value)}</b><span>${escapeHtml(item.label)}</span></div>
      `).join("");

      const experience = data.resume.experience.map((item) => `
        <div class="item">
          <div class="item-head"><h3>${escapeHtml(item.company)}｜${escapeHtml(item.role)}</h3><span class="date">${escapeHtml(item.date)}</span></div>
          <ul>${item.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}</ul>
        </div>
      `).join("");

      const projects = data.resume.projects.map((item) => `
        <div class="project item">
          <div class="item-head"><h3>${escapeHtml(item.title)}</h3><span class="date">${escapeHtml(item.date)}</span></div>
          <p>${escapeHtml(item.summary)}</p>
          <ul>${item.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}</ul>
        </div>
      `).join("");

      const skills = data.resume.skills.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("");
      const tools = data.resume.tools.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      const emails = data.site.emails.filter(Boolean).map((email) => `<span>${escapeHtml(email)}</span>`).join("");

      return `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${escapeHtml(data.site.personName)}产品项目简历</title>
  <style>
    :root{--ink:#12161c;--muted:#59616d;--line:#d9dee5;--accent:#0b6e63;--soft:#edf7f5}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:#e9edf2;font-family:"Segoe UI Variable","PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.45}
    .toolbar{position:sticky;top:0;z-index:10;display:flex;justify-content:center;gap:10px;padding:12px;background:rgba(18,22,28,.94)}.toolbar a,.toolbar button{min-height:38px;padding:8px 14px;color:#fff;border:1px solid rgba(255,255,255,.24);border-radius:5px;background:transparent;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}.toolbar button{color:#101318;background:#fff}
    .page{position:relative;width:210mm;min-height:297mm;margin:20px auto;overflow:hidden;padding:16mm 16mm 14mm 20mm;background:#fff;box-shadow:0 18px 50px rgba(20,28,38,.14)}.page:before{content:"";position:absolute;inset:0 auto 0 0;width:5mm;background:linear-gradient(to bottom,#101318 0 88mm,var(--accent) 88mm 100%)}
    header{display:grid;grid-template-columns:1fr auto;gap:24px;margin:-16mm -16mm 0 -15mm;padding:14mm 16mm 12mm 15mm;color:#fff;background:linear-gradient(120deg,rgba(11,110,99,.36),transparent 55%),#101318}h1,h2,h3,p{margin-top:0}h1{margin-bottom:5px;font-size:30px;line-height:1}.position{margin:0;color:#86e3d7;font-size:14px;font-weight:800}.contact{display:grid;align-content:end;gap:3px;color:rgba(255,255,255,.72);font-size:11px;text-align:right}
    .summary{margin:14px 0 13px;padding:10px 12px;color:#343b45;border-left:3px solid var(--accent);background:#f5f9f8;font-size:11.5px}.proof{display:grid;grid-template-columns:repeat(4,1fr);margin-bottom:15px;border:1px solid #cfd6df;background:#fff}.proof div{padding:8px 10px;border-right:1px solid var(--line)}.proof div:last-child{border-right:0}.proof b{display:block;margin-bottom:2px;font-size:14px}.proof span{color:var(--muted);font-size:9.5px}
    .layout{display:grid;grid-template-columns:1.55fr .75fr;gap:20px}section{margin-bottom:14px}h2{margin-bottom:8px;padding-bottom:5px;color:var(--ink);border-bottom:2px solid var(--ink);font-size:14px}.item{margin-bottom:11px;break-inside:avoid}.item-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:baseline;margin-bottom:3px}h3{margin-bottom:0;font-size:11.5px}.date{color:var(--muted);font-size:9.5px;font-weight:700}ul{margin:4px 0 0;padding-left:16px;color:#343b45;font-size:10.2px}li+li{margin-top:2px}
    .project{position:relative;padding:9px 10px 9px 13px;border-left:3px solid var(--accent);background:linear-gradient(90deg,#f4f8f7,transparent)}.project p{margin-bottom:4px;color:var(--muted);font-size:10px}.side-block{padding:11px;border:1px solid var(--line);border-top:3px solid var(--accent);background:#f8fafb}.side-block+.side-block{margin-top:10px}.side-block h2{border-color:var(--line)}.tags{display:flex;flex-wrap:wrap;gap:5px}.tag{padding:3px 6px;color:#155f58;border:1px solid #c6dfdb;background:var(--soft);font-size:9.5px;font-weight:700}.compact-list{margin-top:0;font-size:9.8px}.education p{margin-bottom:2px;font-size:10.5px;font-weight:700}.education span{color:var(--muted);font-size:9.5px}.note{margin-top:8px;color:var(--muted);font-size:8.5px}
    @media (max-width:850px){.page{width:100%;min-height:0;margin:0;padding:22px 18px;box-shadow:none}.layout{grid-template-columns:1fr}header{grid-template-columns:1fr}.contact{text-align:left}.proof{grid-template-columns:repeat(2,1fr)}.proof div:nth-child(2){border-right:0}}
    @media print{body{background:#fff}.toolbar{display:none}.page{margin:0;box-shadow:none}}
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="index.html">返回网站</a>
    <a href="portfolio.html">查看作品集</a>
    <button onclick="window.print()">打印 / 导出 PDF</button>
  </div>
  <article class="page">
    <header>
      <div>
        <h1>${escapeHtml(data.site.personName)}</h1>
        <p class="position">${escapeHtml(data.site.role)}</p>
      </div>
      <div class="contact">${emails}</div>
    </header>
    <p class="summary">${escapeHtml(data.resume.summary)}</p>
    <div class="proof">${proofs}</div>
    <div class="layout">
      <div>
        <section>
          <h2>工作经历</h2>
          ${experience}
        </section>
        <section>
          <h2>项目经历</h2>
          ${projects}
        </section>
      </div>
      <aside>
        <section class="side-block">
          <h2>核心技能</h2>
          <div class="tags">${skills}</div>
        </section>
        <section class="side-block">
          <h2>工具与协作</h2>
          <ul class="compact-list">${tools}</ul>
        </section>
        <section class="side-block education">
          <h2>教育</h2>
          <p>${escapeHtml(data.resume.education.school)}</p>
          <span>${escapeHtml(data.resume.education.degree)}｜${escapeHtml(data.resume.education.date)}</span>
        </section>
      </aside>
    </div>
  </article>
</body>
</html>`;
    }

    editorTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-editor-tab]");
      if (!button) return;
      currentEditor = button.dataset.editorTab;
      render();
    });

    previewTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-preview-tab]");
      if (!button) return;
      currentPreview = button.dataset.previewTab;
      render();
    });

    editorBody.addEventListener("input", (event) => {
      const element = event.target;
      if (element.matches("[data-path]")) {
        const path = element.dataset.path;
        const isLineArray = ["home.strengths", "portfolio.method", "resume.skills", "resume.tools"].includes(path) || /\.bullets$/.test(path);
        updateAtPath(path, isLineArray ? splitLines(element.value) : element.value);
      }
    });

    editorBody.addEventListener("click", async (event) => {
      const removeBtn = event.target.closest("[data-remove]");
      if (removeBtn) {
        removeArrayItem(removeBtn.dataset.remove, Number(removeBtn.dataset.index));
        return;
      }

      const addBtn = event.target.closest("[data-add]");
      if (addBtn) {
        addArrayItem(addBtn.dataset.add, addBtn.dataset.kind);
        return;
      }

      const verifyBtn = event.target.closest("#verify-token");
      if (verifyBtn) {
        try {
          await verifyToken();
        } catch (error) {
          setLog(`验证失败。\n${error.message}`);
        }
        return;
      }

      const publishBtn = event.target.closest("#publish-all");
      if (publishBtn) {
        try {
          await publishAll();
        } catch (error) {
          setLog(`${document.getElementById("publish-log").textContent}\n发布失败。\n${error.message}`);
        }
        return;
      }

      const openPreviewBtn = event.target.closest("[data-open-preview]");
      if (openPreviewBtn) {
        currentPreview = openPreviewBtn.dataset.openPreview;
        render();
      }
    });

    document.getElementById("export-json").addEventListener("click", downloadJson);
    document.getElementById("import-trigger").addEventListener("click", () => importFile.click());
    document.getElementById("reset-draft").addEventListener("click", () => {
      state = deepClone(publishedData);
      localStorage.removeItem(STORAGE_KEY);
      render();
    });

    importFile.addEventListener("change", async () => {
      const file = importFile.files[0];
      if (!file) return;
      try {
        state = await readImportedFile(file);
        saveDraft();
        render();
      } catch (error) {
        alert("导入失败，请确认是后台导出的 JSON 文件。");
      }
      importFile.value = "";
    });

    render();
  </script>
</body>
</html>
