<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>郑柱坚个人网站后台</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    :root {
      --bg: #eef2f6;
      --paper: #ffffff;
      --ink: #16202b;
      --muted: #667383;
      --line: #d9e1ea;
      --accent: #0f766e;
      --accent-strong: #0b5d57;
      --accent-soft: #e8f6f3;
      --blue: #155eef;
      --warn: #9a6700;
      --danger: #b42318;
      --shadow: 0 18px 50px rgba(22, 32, 43, 0.08);
      --radius: 10px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(rgba(22, 32, 43, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22, 32, 43, 0.04) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
      font-family: "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, textarea, select { font: inherit; }

    .shell {
      width: min(1400px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid rgba(217, 225, 234, 0.92);
      background: rgba(238, 242, 246, 0.88);
      backdrop-filter: blur(16px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 72px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      color: #fff;
      background: linear-gradient(135deg, #13212b, #21576f);
      border-radius: 9px;
      font-size: 13px;
      font-weight: 900;
    }

    .brand-copy b,
    .brand-copy span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn,
    .segmented button {
      min-height: 40px;
      padding: 9px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 10px 24px rgba(22, 32, 43, 0.05);
      font-weight: 800;
    }

    .btn.primary {
      border-color: var(--accent-strong);
      background: var(--accent);
      color: #fff;
    }

    .btn.ghost {
      background: rgba(255, 255, 255, 0.72);
    }

    .btn.warn {
      border-color: #f3dca5;
      background: #fff8e7;
      color: #6a4300;
    }

    .hero {
      padding: 22px 0 18px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 16px;
    }

    .hero-card,
    .status-card,
    .panel,
    .editor-shell,
    .preview-shell {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 28px;
      color: #fff;
      background:
        radial-gradient(circle at 84% 12%, rgba(21, 94, 239, 0.32), transparent 32%),
        radial-gradient(circle at 12% 86%, rgba(15, 118, 110, 0.18), transparent 38%),
        linear-gradient(135deg, #13212b, #24394c);
    }

    .hero-card p:first-child {
      margin: 0 0 12px;
      color: #84e0d5;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 {
      margin-bottom: 14px;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .hero-card p:last-child {
      max-width: 760px;
      margin-bottom: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
    }

    .status-card {
      padding: 20px;
      display: grid;
      gap: 12px;
    }

    .status-card h2,
    .panel h2 {
      margin-bottom: 0;
      font-size: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 4px 10px;
      color: var(--accent-strong);
      border: 1px solid #b6e1da;
      border-radius: 999px;
      background: var(--accent-soft);
      font-size: 12px;
      font-weight: 900;
    }

    .status-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .status-list li {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 14px;
    }

    .status-list b {
      color: var(--muted);
      font-size: 12px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(420px, 0.9fr);
      gap: 16px;
      padding-bottom: 22px;
    }

    .editor-shell,
    .preview-shell {
      min-height: 760px;
      overflow: hidden;
    }

    .section-tabs,
    .preview-tabs {
      display: flex;
      gap: 8px;
      padding: 16px 16px 0;
      overflow-x: auto;
    }

    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .segmented button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent-strong);
      font-weight: 900;
    }

    .editor-body {
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .panel {
      padding: 16px;
    }

    .panel h3 {
      margin-bottom: 10px;
      font-size: 16px;
    }

    .helper {
      color: var(--muted);
      font-size: 13px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .field,
    .array-item {
      display: grid;
      gap: 6px;
    }

    .field label,
    .array-head strong {
      font-size: 13px;
      font-weight: 800;
    }

    .field input,
    .field textarea,
    .field select,
    .token-row input {
      width: 100%;
      padding: 10px 12px;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .field textarea {
      min-height: 108px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus,
    .token-row input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(15, 118, 110, 0.14);
      outline-offset: 1px;
    }

    .field small {
      color: var(--muted);
      font-size: 12px;
    }

    .array-list {
      display: grid;
      gap: 12px;
    }

    .array-item {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fbfc;
    }

    .array-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .array-head-actions,
    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .mini-btn {
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .mini-btn:hover {
      border-color: var(--accent);
      color: var(--accent-strong);
    }

    .array-card-meta {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .validation-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .validation-item {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fbfc;
    }

    .validation-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .validation-item p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .validation-item.warn {
      border-color: #f1c87a;
      background: #fff8e8;
    }

    .validation-item.error {
      border-color: #f3b2b2;
      background: #fff1f1;
    }

    .completion-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .completion-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f9fbfc;
    }

    .completion-card b {
      display: block;
      margin-bottom: 4px;
      font-size: 18px;
    }

    .completion-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .fold-editor {
      margin-top: 8px;
    }

    .fold-editor summary {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--accent-strong);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .fold-content {
      display: grid;
      gap: 12px;
      padding-top: 12px;
    }

    .danger-text { color: var(--danger); }

    .preview-shell {
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .preview-meta {
      padding: 8px 16px 0;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-frame {
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      margin: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .publish-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .token-row {
      display: grid;
      gap: 10px;
    }

    .notice {
      padding: 12px 14px;
      border: 1px solid #f1d9a2;
      border-radius: 8px;
      background: #fff8e6;
      color: #684100;
      font-size: 13px;
    }

    .notice.danger {
      border-color: #f4b6b1;
      background: #fff4f3;
      color: #8b1e1e;
    }

    .log {
      min-height: 120px;
      padding: 12px 14px;
      color: #d7e2ee;
      border-radius: 8px;
      background: #16202b;
      font-size: 13px;
      white-space: pre-wrap;
    }

    .footer-space { height: 6px; }

    @media (max-width: 1100px) {
      .hero-grid,
      .workspace,
      .publish-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .shell { width: min(100% - 20px, 1400px); }
      .topbar-inner,
      .field-grid,
      .field-grid.three {
        grid-template-columns: 1fr;
        display: grid;
      }
      .topbar-inner {
        align-items: start;
        padding: 12px 0;
      }
      .actions {
        width: 100%;
      }
      .btn { width: 100%; }
      .editor-shell,
      .preview-shell {
        min-height: auto;
      }
      .preview-frame {
        min-height: 700px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="shell topbar-inner">
      <div class="brand">
        <div class="mark">ZZJ</div>
        <div class="brand-copy">
          <b>郑柱坚个人网站后台</b>
          <span>表单化编辑、实时预览、直接发布</span>
        </div>
      </div>
      <div class="actions">
        <a class="btn ghost" href="../index.html" target="_blank" rel="noreferrer">查看线上网站</a>
        <button class="btn ghost" id="export-json" type="button">导出内容备份</button>
        <button class="btn ghost" id="import-trigger" type="button">导入内容备份</button>
        <button class="btn warn" id="reset-draft" type="button">恢复已发布内容</button>
        <input id="import-file" type="file" accept=".json" hidden>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="hero">
      <div class="hero-grid">
        <article class="hero-card">
          <p>VISUAL CONTENT ADMIN</p>
          <h1>给小白用的内容后台，不再直接改 HTML。</h1>
          <p>左边按表单改内容，右边看页面实时预览。确认无误后，在发布页填入 GitHub token，就能直接更新首页、作品集、简历页和内容配置文件。</p>
        </article>
        <aside class="status-card">
          <h2>当前状态</h2>
          <span class="pill">本地草稿实时保存</span>
          <ul class="status-list">
            <li><b>编辑方式</b><span>表单化内容编辑</span></li>
            <li><b>预览方式</b><span>后台右侧 iframe 实时预览</span></li>
            <li><b>发布目标</b><span>GitHub Pages / main 分支</span></li>
            <li><b>安全原则</b><span>Token 不写入仓库，不存浏览器</span></li>
          </ul>
        </aside>
      </div>
    </section>

    <section class="workspace">
      <section class="editor-shell">
        <div class="section-tabs segmented" id="editor-tabs"></div>
        <div class="editor-body" id="editor-body"></div>
      </section>

      <section class="preview-shell">
        <div class="preview-tabs segmented" id="preview-tabs"></div>
        <div class="preview-meta" id="preview-meta">预览会随着左侧输入自动更新。</div>
        <iframe class="preview-frame" id="preview-frame" title="页面预览"></iframe>
      </section>
    </section>
    <div class="footer-space"></div>
  </main>

  <script src="site-data.js"></script>
  <script>
    const REPO_OWNER = "Vincentzozo";
    const REPO_NAME = "product-portfolio";
    const BRANCH = "main";
    const STORAGE_KEY = "zzj-site-admin-draft-v2";
    const LEGACY_STORAGE_KEYS = ["zzj-site-admin-draft-v1"];
    const PAGES = [
      { key: "home", label: "首页内容" },
      { key: "portfolio", label: "作品集内容" },
      { key: "resume", label: "打印简历内容" },
      { key: "publish", label: "发布" }
    ];
    const PREVIEWS = [
      { key: "home", label: "首页预览" },
      { key: "portfolio", label: "作品集预览" },
      { key: "resume", label: "简历预览" }
    ];

    const publishedData = normalizeState(window.SITE_DATA);
    const savedDraft = readDraft();
    let state = savedDraft || deepClone(publishedData);
    let currentEditor = "home";
    let currentPreview = "home";
    let githubToken = "";

    const editorTabs = document.getElementById("editor-tabs");
    const previewTabs = document.getElementById("preview-tabs");
    const editorBody = document.getElementById("editor-body");
    const previewFrame = document.getElementById("preview-frame");
    const previewMeta = document.getElementById("preview-meta");
    const importFile = document.getElementById("import-file");

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function normalizeStringArray(value, fallback = []) {
      if (!Array.isArray(value)) return deepClone(fallback);
      return value.map((item) => String(item ?? "").trim()).filter(Boolean);
    }

    function normalizeObjectArray(value, fallback = [], mapper = (item) => item) {
      if (!Array.isArray(value)) return deepClone(fallback);
      const mapped = value.map((item) => mapper(item)).filter(Boolean);
      return mapped.length ? mapped : deepClone(fallback);
    }

    function normalizeState(input) {
      const base = deepClone(window.SITE_DATA);
      const data = input && typeof input === "object" ? deepClone(input) : {};
      const oldCases = Array.isArray(data.portfolio?.cases) ? data.portfolio.cases : [];

      return {
        site: {
          ...base.site,
          ...(data.site || {}),
          emails: normalizeStringArray(data.site?.emails, base.site.emails)
        },
        home: {
          ...base.home,
          ...(data.home || {}),
          metrics: normalizeObjectArray(data.home?.metrics, base.home.metrics, (item) => ({
            value: String(item?.value ?? ""),
            label: String(item?.label ?? ""),
            note: String(item?.note ?? "")
          })),
          highlights: normalizeObjectArray(data.home?.highlights, base.home.highlights, (item) => ({
            title: String(item?.title ?? ""),
            summary: String(item?.summary ?? ""),
            proof: String(item?.proof ?? "")
          })),
          strengths: normalizeStringArray(data.home?.strengths, base.home.strengths)
        },
        portfolio: {
          ...base.portfolio,
          ...(data.portfolio || {}),
          metrics: normalizeObjectArray(data.portfolio?.metrics, base.portfolio.metrics, (item) => ({
            value: String(item?.value ?? ""),
            label: String(item?.label ?? ""),
            note: String(item?.note ?? "")
          })),
          capabilityBlocks: normalizeObjectArray(data.portfolio?.capabilityBlocks, base.portfolio.capabilityBlocks, (item) => ({
            title: String(item?.title ?? ""),
            summary: String(item?.summary ?? "")
          })),
          works: normalizeObjectArray(data.portfolio?.works || oldCases, base.portfolio.works, (item) => ({
            title: String(item?.title ?? ""),
            role: String(item?.role ?? item?.proof ?? ""),
            context: String(item?.context ?? item?.summary ?? ""),
            outputs: String(item?.outputs ?? item?.result ?? ""),
            judgement: String(item?.judgement ?? item?.decision ?? ""),
            collaboration: String(item?.collaboration ?? item?.process ?? ""),
            value: String(item?.value ?? item?.proof ?? "")
          })),
          artifacts: normalizeObjectArray(data.portfolio?.artifacts, base.portfolio.artifacts, (item) => ({
            title: String(item?.title ?? ""),
            items: normalizeStringArray(item?.items, [])
          })),
          assets: normalizeObjectArray(data.portfolio?.assets, base.portfolio.assets || [], (item) => ({
            title: String(item?.title ?? ""),
            type: String(item?.type ?? ""),
            description: String(item?.description ?? ""),
            file: String(item?.file ?? ""),
            preview: String(item?.preview ?? ""),
            tags: normalizeStringArray(item?.tags, [])
          })),
          method: normalizeStringArray(data.portfolio?.method, base.portfolio.method)
        },
        resume: {
          ...base.resume,
          ...(data.resume || {}),
          proofs: normalizeObjectArray(data.resume?.proofs, base.resume.proofs, (item) => ({
            value: String(item?.value ?? ""),
            label: String(item?.label ?? "")
          })),
          experience: normalizeObjectArray(data.resume?.experience, base.resume.experience, (item) => ({
            company: String(item?.company ?? ""),
            role: String(item?.role ?? ""),
            date: String(item?.date ?? ""),
            bullets: normalizeStringArray(item?.bullets, [])
          })),
          projects: normalizeObjectArray(data.resume?.projects, base.resume.projects, (item) => ({
            title: String(item?.title ?? ""),
            summary: String(item?.summary ?? ""),
            date: String(item?.date ?? ""),
            bullets: normalizeStringArray(item?.bullets, [])
          })),
          skills: normalizeStringArray(data.resume?.skills, base.resume.skills),
          tools: normalizeStringArray(data.resume?.tools, base.resume.tools),
          education: {
            ...base.resume.education,
            ...(data.resume?.education || {})
          }
        }
      };
    }

    function readDraft() {
      try {
        const keys = [STORAGE_KEY, ...LEGACY_STORAGE_KEYS];
        for (const key of keys) {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const normalized = normalizeState(JSON.parse(raw));
          if (key !== STORAGE_KEY) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
          }
          return normalized;
        }
        return null;
      } catch (error) {
        return null;
      }
    }

    function saveDraft() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function joinLines(list) {
      return Array.isArray(list) ? list.join("\n") : "";
    }

    function splitLines(value) {
      return String(value || "")
        .split(/\r?\n/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function updateAtPath(path, value) {
      const parts = path.split(".");
      let target = state;
      for (let i = 0; i < parts.length - 1; i += 1) {
        target = target[parts[i]];
      }
      target[parts[parts.length - 1]] = value;
      saveDraft();
      renderPreview();
    }

    function renderTabs() {
      editorTabs.innerHTML = PAGES.map((item) => `
        <button type="button" class="${item.key === currentEditor ? "active" : ""}" data-editor-tab="${item.key}">${item.label}</button>
      `).join("");
      previewTabs.innerHTML = PREVIEWS.map((item) => `
        <button type="button" class="${item.key === currentPreview ? "active" : ""}" data-preview-tab="${item.key}">${item.label}</button>
      `).join("");
    }

    function renderField(label, path, value, type = "text", hint = "") {
      const safeValue = escapeHtml(value);
      const input = type === "textarea"
        ? `<textarea data-path="${path}">${safeValue}</textarea>`
        : `<input type="${type}" data-path="${path}" value="${safeValue}">`;
      return `
        <div class="field">
          <label>${label}</label>
          ${input}
          ${hint ? `<small>${hint}</small>` : ""}
        </div>
      `;
    }

    function renderArrayHead(path, index, title) {
      return `
        <div class="array-head">
          <strong>${title}</strong>

          ${items.map((item) => `
            <div class="validation-item ${item.level}">

              <p>${escapeHtml(item.detail)}</p>

        </div>
      `;
    }

    function getPortfolioCompletion(data) {
      const works = data.portfolio.works || [];
      const assets = data.portfolio.assets || [];
      const fullWorks = works.filter((item) => item.title && item.context && item.outputs && item.judgement && item.value).length;
      const linkedAssets = assets.filter((item) => item.title && item.file).length;
      return [
        { label: "定位卡片", value: `${data.portfolio.capabilityBlocks.length}/3`, done: data.portfolio.capabilityBlocks.length >= 3 },
        { label: "工作样本", value: `${fullWorks}/${works.length || 0}`, done: works.length > 0 && fullWorks === works.length },
        { label: "实际附件", value: `${linkedAssets}/${assets.length || 0}`, done: linkedAssets >= 3 },
        { label: "方法步骤", value: `${data.portfolio.method.length}/4`, done: data.portfolio.method.length >= 4 }
      ];
    }

      saveDraft();
      render();

      const factory = {
        metric: () => ({ value: "新数据", label: "新标题", note: "补充说明" }),

          bullets: ["补充一条经历要点"]
        }),

          title: "新项目",
          summary: "项目摘要",
          date: "时间",
          bullets: ["补充一条项目要点"]
        })
      };
      target.push(factory[kind]());
      saveDraft();
      render();
    }

    function moveArrayItem(path, index, direction) {
      const parts = path.split(".");
      let target = state;
      for (const part of parts) target = target[part];
      const nextIndex = direction === "up" ? index - 1 : index + 1;
      if (nextIndex < 0 || nextIndex >= target.length) return;
      const [item] = target.splice(index, 1);
      target.splice(nextIndex, 0, item);
      saveDraft();
      render();
    }

    function duplicateArrayItem(path, index) {
      const parts = path.split(".");
      let target = state;
      for (const part of parts) target = target[part];
      target.splice(index + 1, 0, deepClone(target[index]));
      saveDraft();
      render();
    }

    function validateState(data) {
      const errors = [];
      const warnings = [];
      if (!data.site.siteName.trim()) errors.push({ level: "error", title: "网站名称为空", detail: "首页和导航会缺少站点名称。" });
      if (!data.site.personName.trim()) errors.push({ level: "error", title: "姓名为空", detail: "个人品牌识别会缺失。" });
      if (!data.site.role.trim()) warnings.push({ level: "warn", title: "岗位定位未填写", detail: "建议明确写出求职方向。" });
      if (!data.site.emails.filter((item) => String(item || "").trim()).length) errors.push({ level: "error", title: "联系方式为空", detail: "至少保留一个邮箱。" });
      if (!data.portfolio.title.trim()) errors.push({ level: "error", title: "作品集标题为空", detail: "作品集页首屏缺少主标题。" });
      if (!data.portfolio.works.length) errors.push({ level: "error", title: "没有作品样本", detail: "作品集至少需要 1 个代表工作样本。" });
      data.portfolio.works.forEach((item, index) => {
        if (!item.title.trim()) errors.push({ level: "error", title: `样本 ${index + 1} 缺标题`, detail: "建议直接写能力场景名称。" });
        if (!item.context.trim()) warnings.push({ level: "warn", title: `样本 ${index + 1} 缺背景`, detail: "读者很难理解你处理的是哪类问题。" });
        if (!item.value.trim()) warnings.push({ level: "warn", title: `样本 ${index + 1} 缺证明价值`, detail: "建议补一句这个样本说明了什么能力。" });
      });
      if (!data.portfolio.artifacts.length) warnings.push({ level: "warn", title: "可展示产物为空", detail: "建议至少给出 1 组可展示文档或原型。" });
      data.portfolio.artifacts.forEach((item, index) => {
        if (!item.title.trim()) warnings.push({ level: "warn", title: `产物分组 ${index + 1} 缺标题`, detail: "建议写成文档类型或产物类型。" });
        if (!item.items.length) warnings.push({ level: "warn", title: `产物分组 ${index + 1} 为空`, detail: "建议至少写 2 到 4 条具体产物。" });
      });
      if (!data.portfolio.assets?.length) warnings.push({ level: "warn", title: "实际作品附件为空", detail: "建议至少放 2 到 4 个可点开的真实作品。" });
      (data.portfolio.assets || []).forEach((item, index) => {
        if (!item.title.trim()) warnings.push({ level: "warn", title: `附件 ${index + 1} 缺标题`, detail: "建议写清楚附件是什么。" });
        if (!item.file.trim()) warnings.push({ level: "warn", title: `附件 ${index + 1} 缺文件链接`, detail: "没有链接就无法在作品集页打开。" });
      });
      if (!data.resume.summary.trim()) warnings.push({ level: "warn", title: "简历摘要为空", detail: "打印简历页顶部会比较空。" });
      return { errors, warnings };

    function downloadJson() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "zzj-site-content.json";
      link.click();
      URL.revokeObjectURL(url);
    }

    function readImportedFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            resolve(JSON.parse(reader.result));
          } catch (error) {
            reject(error);
          }
        };
        reader.onerror = reject;
        reader.readAsText(file, "utf-8");
      });
    }

    function setLog(message) {
      const log = document.getElementById("publish-log");
      if (log) log.textContent = message;
    }

    function toBase64Utf8(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary);
    }

    function encodePath(path) {
      return path.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    async function githubRequest(path, options = {}) {
      const response = await fetch(`https://api.github.com${path}`, {
        ...options,
        headers: {
          Accept: "application/vnd.github+json",
          Authorization: `Bearer ${githubToken}`,
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(`${response.status} ${response.statusText}\n${text}`);
      }
      return response.status === 204 ? null : response.json();
    }

    async function getFileSha(path) {
      const result = await githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodePath(path)}?ref=${BRANCH}`);
      return result.sha;
    }

    async function updateFile(path, content, message) {
      let sha = null;
      try {
        sha = await getFileSha(path);
      } catch (error) {
        sha = null;
      }
      const payload = {
        message,
        content: toBase64Utf8(content),
        branch: BRANCH
      };
      if (sha) payload.sha = sha;
      return githubRequest(`/repos/${REPO_OWNER}/${REPO_NAME}/contents/${encodePath(path)}`, {
        method: "PUT",
        body: JSON.stringify(payload)
      });
    }

    function serializeDataScript(data) {
      return `window.SITE_DATA = ${JSON.stringify(data, null, 2)};\n`;
    }

    async function verifyToken() {
      githubToken = document.getElementById("github-token").value.trim();
      if (!githubToken) {
        setLog("请先输入 GitHub token。");
        return;
      }
      setLog("正在验证 GitHub 连接...");
      const user = await githubRequest("/user");
      setLog(`连接成功。\n当前账号：${user.login}\n仓库：${REPO_OWNER}/${REPO_NAME}`);
    }

    async function publishAll() {
      githubToken = document.getElementById("github-token").value.trim();
      const commitMessage = document.getElementById("commit-message").value.trim() || "更新网站内容";
      if (!githubToken) {
        setLog("请先输入 GitHub token。");
        return;
      }
      const validation = validateState(state);
      if (validation.errors.length) {
        const details = validation.errors.map((item, index) => `${index + 1}. ${item.title}`).join("\n");
        setLog(`发布已拦截。\n请先修复这些错误项：\n${details}`);
        return;
      }

      const adminSource = await fetch(window.location.href, { cache: "no-store" }).then((response) => response.text());
      const files = [
        { path: "admin/index.html", content: adminSource },
        { path: "admin/site-data.js", content: serializeDataScript(state) },
        { path: "index.html", content: generateHomeHtml(state) },
        { path: "portfolio.html", content: generatePortfolioHtml(state) },
        { path: "resume.html", content: generateResumeHtml(state) }
      ];

      setLog("开始发布...\n");
      for (const file of files) {
        setLog(`${document.getElementById("publish-log").textContent}更新 ${file.path}...\n`);
        await updateFile(file.path, file.content, commitMessage);
      }
      setLog(`${document.getElementById("publish-log").textContent}\n发布完成。\nGitHub Pages 通常会在 1-3 分钟内更新。`);
    }

    .contact{padding:60px 0;color:#fff;background:#11151b}.contact-grid{display:flex;justify-content:space-between;align-items:center;gap:30px}.contact h2{margin:0 0 8px;font-size:36px}.contact p{margin:0;color:rgba(255,255,255,.65)}.contact-links{display:grid;gap:8px;min-width:270px}.contact-links a{padding:10px 12px;border:1px solid rgba(255,255,255,.18);border-radius:8px}
    @media(max-width:850px){.hero-grid,.head,.work-grid{grid-template-columns:1fr}.capability-grid,.artifact-grid,.asset-grid{grid-template-columns:1fr}.method{grid-template-columns:repeat(2,1fr)}.contact-grid{align-items:flex-start;flex-direction:column}.work-head{flex-direction:column}}@media(max-width:560px){.shell{width:min(100% - 28px,1160px)}.nav{align-items:flex-start;flex-direction:column;padding:12px 0}.navlinks{width:100%;overflow-x:auto}.hero{padding-top:52px}.hero-proof{grid-template-columns:1fr}.hero-proof div{border-right:0}.hero-proof div:nth-child(3){border-bottom:1px solid rgba(255,255,255,.18)}.method{grid-template-columns:1fr}}

<body>
  <header class="topbar">
    <nav class="shell nav" aria-label="主导航">
      <a class="brand" href="index.html"><span class="mark">ZZJ</span><span>${escapeHtml(data.site.siteName)}</span></a>

        <a href="index.html#about">简介</a>

  </header>
  <main>
    <section class="hero">

    </section>
    <section class="section" id="overview">
      <div class="shell">
        <div class="head"><h2>能力定位</h2><p>${escapeHtml(data.site.tagline)}</p></div>

      </div>
    </section>
    <section class="section" id="works">
      <div class="shell">
        <div class="head"><h2>代表工作样本</h2><p>植物工厂生产系统、MES 需求分析、软硬件协同和交付闭环的代表材料。</p></div>
        <div class="work-list">${works}</div>
      </div>
    </section>
    <section class="section" id="artifacts">
      <div class="shell">
        <div class="head"><h2>可展示产物</h2><p>需求定义、流程建模、原型表达、测试验证和交付复盘材料。</p></div>
        <div class="artifact-grid">${artifacts}</div>
      </div>
    </section>
    <section class="section alt" id="asset-gallery">
      <div class="shell">
        <div class="head"><h2>实际作品附件</h2><p>可直接打开的流程图、状态流、需求说明、看板原型和测试清单。</p></div>
        <div class="asset-grid">${assets}</div>
      </div>
    </section>
    <section class="section" id="method">
      <div class="shell">
        <div class="head"><h2>工作方式</h2><p>从现场流程、系统模型、原型说明到测试反馈的闭环推进路径。</p></div>
        <div class="method">${method}</div>
      </div>
    </section>
  </main>
  <footer class="contact" id="contact">
    <div class="shell contact-grid">
      <div><h2>${escapeHtml(data.site.contactTitle)}</h2><p>${escapeHtml(data.site.role)}</p></div>
      <div class="contact-links">${emails}</div>
    </div>

</body>
</html>`;
    }

    function generateResumeHtml(data) {
      const proofs = data.resume.proofs.map((item) => `
        <div><b>${escapeHtml(item.value)}</b><span>${escapeHtml(item.label)}</span></div>
      `).join("");

      const experience = data.resume.experience.map((item) => `
        <div class="item">
          <div class="item-head"><h3>${escapeHtml(item.company)}｜${escapeHtml(item.role)}</h3><span class="date">${escapeHtml(item.date)}</span></div>
          <ul>${item.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}</ul>
        </div>
      `).join("");

      const projects = data.resume.projects.map((item) => `
        <div class="project item">
          <div class="item-head"><h3>${escapeHtml(item.title)}</h3><span class="date">${escapeHtml(item.date)}</span></div>
          <p>${escapeHtml(item.summary)}</p>
          <ul>${item.bullets.map((bullet) => `<li>${escapeHtml(bullet)}</li>`).join("")}</ul>
        </div>
      `).join("");

      const skills = data.resume.skills.map((item) => `<span class="tag">${escapeHtml(item)}</span>`).join("");
      const tools = data.resume.tools.map((item) => `<li>${escapeHtml(item)}</li>`).join("");
      const emails = data.site.emails.filter(Boolean).map((email) => `<span>${escapeHtml(email)}</span>`).join("");

      return `<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${escapeHtml(data.site.personName)}产品项目简历</title>
  <style>
    :root{--ink:#12161c;--muted:#59616d;--line:#d9dee5;--accent:#0b6e63;--soft:#edf7f5}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:#e9edf2;font-family:"Segoe UI Variable","PingFang SC","Microsoft YaHei",Arial,sans-serif;line-height:1.45}
    .toolbar{position:sticky;top:0;z-index:10;display:flex;justify-content:center;gap:10px;padding:12px;background:rgba(18,22,28,.94)}.toolbar a,.toolbar button{min-height:38px;padding:8px 14px;color:#fff;border:1px solid rgba(255,255,255,.24);border-radius:5px;background:transparent;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}.toolbar button{color:#101318;background:#fff}
    .page{position:relative;width:210mm;min-height:297mm;margin:20px auto;overflow:hidden;padding:16mm 16mm 14mm 20mm;background:#fff;box-shadow:0 18px 50px rgba(20,28,38,.14)}.page:before{content:"";position:absolute;inset:0 auto 0 0;width:5mm;background:linear-gradient(to bottom,#101318 0 88mm,var(--accent) 88mm 100%)}
    header{display:grid;grid-template-columns:1fr auto;gap:24px;margin:-16mm -16mm 0 -15mm;padding:14mm 16mm 12mm 15mm;color:#fff;background:linear-gradient(120deg,rgba(11,110,99,.36),transparent 55%),#101318}h1,h2,h3,p{margin-top:0}h1{margin-bottom:5px;font-size:30px;line-height:1}.position{margin:0;color:#86e3d7;font-size:14px;font-weight:800}.contact{display:grid;align-content:end;gap:3px;color:rgba(255,255,255,.72);font-size:11px;text-align:right}
    .summary{margin:14px 0 13px;padding:10px 12px;color:#343b45;border-left:3px solid var(--accent);background:#f5f9f8;font-size:11.5px}.proof{display:grid;grid-template-columns:repeat(4,1fr);margin-bottom:15px;border:1px solid #cfd6df;background:#fff}.proof div{padding:7px 9px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.proof div:nth-child(4n){border-right:0}.proof div:nth-last-child(-n+4){border-bottom:0}.proof b{display:block;margin-bottom:2px;font-size:13.5px}.proof span{color:var(--muted);font-size:9.2px}
    .layout{display:grid;grid-template-columns:1.55fr .75fr;gap:20px}section{margin-bottom:14px}h2{margin-bottom:8px;padding-bottom:5px;color:var(--ink);border-bottom:2px solid var(--ink);font-size:14px}.item{margin-bottom:11px;break-inside:avoid}.item-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:baseline;margin-bottom:3px}h3{margin-bottom:0;font-size:11.5px}.date{color:var(--muted);font-size:9.5px;font-weight:700}ul{margin:4px 0 0;padding-left:16px;color:#343b45;font-size:10.2px}li+li{margin-top:2px}
    .project{position:relative;padding:9px 10px 9px 13px;border-left:3px solid var(--accent);background:linear-gradient(90deg,#f4f8f7,transparent)}.project p{margin-bottom:4px;color:var(--muted);font-size:10px}.side-block{padding:11px;border:1px solid var(--line);border-top:3px solid var(--accent);background:#f8fafb}.side-block+.side-block{margin-top:10px}.side-block h2{border-color:var(--line)}.tags{display:flex;flex-wrap:wrap;gap:5px}.tag{padding:3px 6px;color:#155f58;border:1px solid #c6dfdb;background:var(--soft);font-size:9.5px;font-weight:700}.compact-list{margin-top:0;font-size:9.8px}.education p{margin-bottom:2px;font-size:10.5px;font-weight:700}.education span{color:var(--muted);font-size:9.5px}.note{margin-top:8px;color:var(--muted);font-size:8.5px}
    @media (max-width:850px){.page{width:100%;min-height:0;margin:0;padding:22px 18px;box-shadow:none}.layout{grid-template-columns:1fr}header{grid-template-columns:1fr}.contact{text-align:left}.proof{grid-template-columns:repeat(2,1fr)}.proof div:nth-child(2){border-right:0}}
    @media print{body{background:#fff}.toolbar{display:none}.page{margin:0;box-shadow:none}}
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="index.html">返回网站</a>
    <a href="portfolio.html">查看作品集</a>
    <button onclick="window.print()">打印 / 导出 PDF</button>
  </div>
  <article class="page">
    <header>
      <div>
        <h1>${escapeHtml(data.site.personName)}</h1>
        <p class="position">${escapeHtml(data.site.role)}</p>
      </div>
      <div class="contact">${emails}</div>
    </header>
    <p class="summary">${escapeHtml(data.resume.summary)}</p>
    <div class="proof">${proofs}</div>
    <div class="layout">
      <div>
        <section>
          <h2>工作经历</h2>
          ${experience}
        </section>
        <section>
          <h2>项目经历</h2>
          ${projects}
        </section>
      </div>
      <aside>
        <section class="side-block">
          <h2>核心技能</h2>
          <div class="tags">${skills}</div>
        </section>
        <section class="side-block">
          <h2>工具与协作</h2>
          <ul class="compact-list">${tools}</ul>
        </section>
        <section class="side-block education">
          <h2>教育</h2>
          <p>${escapeHtml(data.resume.education.school)}</p>
          <span>${escapeHtml(data.resume.education.degree)}｜${escapeHtml(data.resume.education.date)}</span>
        </section>
      </aside>
    </div>
  </article>
</body>
</html>`;
    }

    editorTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-editor-tab]");
      if (!button) return;
      currentEditor = button.dataset.editorTab;
      render();
    });

    previewTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-preview-tab]");
      if (!button) return;
      currentPreview = button.dataset.previewTab;
      render();
    });

    editorBody.addEventListener("input", (event) => {
      const element = event.target;
      if (element.matches("[data-path]")) {
        const path = element.dataset.path;
        const isLineArray = ["home.strengths", "portfolio.method", "resume.skills", "resume.tools"].includes(path) || /\.bullets$/.test(path) || /\.items$/.test(path) || /\.tags$/.test(path);
        updateAtPath(path, isLineArray ? splitLines(element.value) : element.value);
      }
    });

    editorBody.addEventListener("click", async (event) => {
      const removeBtn = event.target.closest("[data-remove]");
      if (removeBtn) {
        removeArrayItem(removeBtn.dataset.remove, Number(removeBtn.dataset.index));
        return;
      }

      const moveBtn = event.target.closest("[data-move]");
      if (moveBtn) {
        moveArrayItem(moveBtn.dataset.move, Number(moveBtn.dataset.index), moveBtn.dataset.direction);
        return;
      }

      const duplicateBtn = event.target.closest("[data-duplicate]");
      if (duplicateBtn) {
        duplicateArrayItem(duplicateBtn.dataset.duplicate, Number(duplicateBtn.dataset.index));
        return;
      }

      const addBtn = event.target.closest("[data-add]");
      if (addBtn) {
        addArrayItem(addBtn.dataset.add, addBtn.dataset.kind);
        return;
      }

      const templateBtn = event.target.closest("[data-template]");
      if (templateBtn) {
        insertTemplate(templateBtn.dataset.template);
        return;
      }

      const verifyBtn = event.target.closest("#verify-token");
      if (verifyBtn) {
        try {
          await verifyToken();
        } catch (error) {
          setLog(`验证失败。\n${error.message}`);
        }
        return;
      }

      const publishBtn = event.target.closest("#publish-all");
      if (publishBtn) {
        try {
          await publishAll();
        } catch (error) {
          setLog(`${document.getElementById("publish-log").textContent}\n发布失败。\n${error.message}`);
        }
        return;
      }

      const openPreviewBtn = event.target.closest("[data-open-preview]");
      if (openPreviewBtn) {
        currentPreview = openPreviewBtn.dataset.openPreview;
        render();
      }
    });

    document.getElementById("export-json").addEventListener("click", downloadJson);
    document.getElementById("import-trigger").addEventListener("click", () => importFile.click());
    document.getElementById("reset-draft").addEventListener("click", () => {
      state = deepClone(publishedData);
      localStorage.removeItem(STORAGE_KEY);
      LEGACY_STORAGE_KEYS.forEach((key) => localStorage.removeItem(key));
      render();
    });

    importFile.addEventListener("change", async () => {
      const file = importFile.files[0];
      if (!file) return;
      try {
        state = normalizeState(await readImportedFile(file));
        saveDraft();
        render();
      } catch (error) {
        alert("导入失败，请确认是后台导出的 JSON 文件。");
      }
      importFile.value = "";
    });

    render();
  </script>
</body>
</html>
